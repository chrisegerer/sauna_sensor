esphome:
  name: saun

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  - platform: esphome
    password: !secret api_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Saun Fallback Hotspot"
    password: "weg198kkLtIL"

captive_portal:


i2c:
  sda: GPIO06
  scl: GPIO07
  scan: true
  frequency: 100kHz

spi:
  clk_pin: GPIO08
  mosi_pin: GPIO10

output:
  - platform: ledc
    pin: GPIO02
    id: display_bl_output

light:
  - platform: monochromatic
    id: display_bl
    name: "Display Backlight"
    output: display_bl_output

time:
  - platform: homeassistant
    id: esptime
    on_time_sync:
      then:
        - lvgl.label.update:
            id: lbl_date
            text: !lambda |-
              auto now = id(esptime).now();
              static char buf[11];
              snprintf(buf, sizeof(buf), "%02d.%02d.%04d", now.day_of_month, now.month, now.year);
              return buf;
        - lvgl.label.update:
            id: lbl_time
            text: !lambda |-
              auto now = id(esptime).now();
              static char buf[6];
              snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
              return buf;
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_date
              text: !lambda |-
                auto now = id(esptime).now();
                static char buf[11];
                snprintf(buf, sizeof(buf), "%02d.%02d.%04d", now.day_of_month, now.month, now.year);
                return buf;
          - lvgl.label.update:
              id: lbl_time
              text: !lambda |-
                auto now = id(esptime).now();
                static char buf[6];
                snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
                return buf;

binary_sensor:
  - platform: gpio
    pin:
      number: 20
      mode:
        input: true
        pullup: true
    name: "Sauna Push Button"
    on_press:
      then:
        - light.toggle: display_bl

sensor:
  # Sensirion SHT40 sensor
  - platform: sht4x
    temperature:
      name: "Sauna Temperature"
      on_value:
        - lvgl.label.update:
            id: lbl_temp
            text: !lambda |-
              static char buf[10];
              snprintf(buf, sizeof(buf), "%.1f \U000F0504", x);
              return buf;
    humidity:
      name: "Sauna Relative Humidity"
      on_value:
        - lvgl.label.update:
            id: lbl_hum
            text: !lambda |-
              static char buf[10];
              snprintf(buf, sizeof(buf), "%.1f \U000F03F0", x);
              return buf;
  # WiFi sensor
  - platform: wifi_signal
    name: "Sauna WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: copy
    source_id: wifi_signal_db
    name: "Sauna WiFi Signal Percentage"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""
    on_value:
      if:
        condition:
          wifi.connected:
        then:
          - lvgl.label.update:
              id: lbl_wifi_icon
              text: !lambda |-
                if (x < 20.0) {
                  return "\U000F091F"; // mdi-wifi-strength-1
                } else if (x < 40.0) {
                  return "\U000F0922"; // mdi-wifi-strength-2
                } else if (x < 60.0) {
                  return "\U000F0925"; // mdi-wifi-strength-3
                } else {
                  return "\U000F0928"; // mdi-wifi-strength-4
                }
        else:
          - lvgl.label.update:
              id: lbl_wifi_icon
              text: !lambda |-
                return "\U000F092B"; // mdi-wifi-alert
  # Outdoor temperature from heat pump
  - platform: homeassistant
    id: outside_temperature
    entity_id: sensor.kuutsu_13_outdoor_temperature
    on_value:
      - lvgl.label.update:
          id: lbl_temp_outside
          text: !lambda |-
            static char buf[10];
            snprintf(buf, sizeof(buf), "%.1f \U000F0504", x);
            return buf;
  # Battery voltage
  - platform: adc
    pin: GPIO04
    name: "Sauna Battery Voltage"
    samples: 10
    attenuation: 12db
    update_interval: 60s

font: !include fonts.yaml

lvgl:
  buffer_size: 25%
  style_definitions:
    - id: header_footer
      width: 100%
      height: 60
      bg_opa: TRANSP
      border_opa: TRANSP
      radius: 0
      pad_all: 0
      text_font: helvetica_mid
  top_layer:
    styles: header_footer
    widgets:
      - label:
          id: lbl_header
          text: "Saun"
          align: top_left
          x: 18
          y: 8
      - label:
          id: lbl_wifi_icon
          text: "\U000F092B" # default is wifi-alert
          align: top_right
          x: -18
          y: 6
      - label:
          id: lbl_date
          text: "--.--.----"
          text_font: helvetica_small
          align: bottom_left
          x: 18
          y: -8
      - label:
          id: lbl_time
          text: "--:--"
          text_font: helvetica_small
          align: bottom_right
          x: -18
          y: -8
  widgets:
    - obj:
        align: CENTER
        width: 100%
        height: 100%
        pad_all: 6
        pad_top: 40
        pad_bottom: 40
        bg_opa: TRANSP
        border_opa: TRANSP
        layout:
          type: GRID
          grid_columns: [FR(30), FR(30), FR(40)]
          grid_rows: [FR(30), FR(20), FR(30), FR(20)]
          pad_row: 4
          pad_column: 4
        widgets:
          - label:
              id: lbl_sauna_icon
              grid_cell_column_pos: 0
              grid_cell_row_pos: 0
              grid_cell_column_span: 2
              grid_cell_row_span: 2
              grid_cell_x_align: CENTER
              grid_cell_y_align: CENTER
              text: "\U0000F6F7"
              text_font: icons_extralarge
          - label:
              id: lbl_temp
              grid_cell_column_pos: 0
              grid_cell_row_pos: 2
              grid_cell_column_span: 2
              grid_cell_row_span: 2
              grid_cell_x_align: CENTER
              grid_cell_y_align: CENTER
              text: "--.- \U000F0504"
              text_font: helvetica_large
          - label:
              id: lbl_hum_icon
              grid_cell_column_pos: 2
              grid_cell_row_pos: 0
              grid_cell_x_align: CENTER
              grid_cell_y_align: CENTER
              text: "\U000F058E"
              text_font: helvetica_mid
          - label:
              id: lbl_hum
              grid_cell_column_pos: 2
              grid_cell_row_pos: 1
              grid_cell_x_align: CENTER
              grid_cell_y_align: CENTER
              text: "-.- \U000F03F0"
              text_font: helvetica_small
          - label:
              id: lbl_temp_icon_outside
              grid_cell_column_pos: 2
              grid_cell_row_pos: 2
              grid_cell_x_align: CENTER
              grid_cell_y_align: CENTER
              text: "\U000F0F55"
              text_font: helvetica_mid
          - label:
              id: lbl_temp_outside
              grid_cell_column_pos: 2
              grid_cell_row_pos: 3
              grid_cell_x_align: CENTER
              grid_cell_y_align: CENTER
              text: "-.- \U000F0504"
              text_font: helvetica_small

display:
  - platform: ili9xxx
    model: st7789v
    dimensions:
      width: 280
      height: 240
      offset_width: 20
      offset_height: 0
    transform:
      swap_xy: true
      mirror_x: true
    cs_pin: GPIO03
    dc_pin: GPIO05
    reset_pin: GPIO21
    color_palette: GRAYSCALE
    invert_colors: false
    #show_test_card: true
    auto_clear_enabled: false
    update_interval: never
