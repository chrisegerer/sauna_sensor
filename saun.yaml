esphome:
  name: saun

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  - platform: esphome
    password: !secret api_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Saun Fallback Hotspot"
    password: "weg198kkLtIL"

captive_portal:


i2c:
  sda: GPIO06
  scl: GPIO07
  scan: true
  frequency: 100kHz

spi:
  clk_pin: GPIO08
  mosi_pin: GPIO10

output:
  - platform: ledc
    pin: GPIO02
    id: display_bl_output

light:
  - platform: monochromatic
    id: display_bl
    name: "Display Backlight"
    output: display_bl_output
    restore_mode: ALWAYS_ON

time:
  - platform: homeassistant
    id: esptime
    on_time_sync:
      then:
        - lvgl.label.update:
            id: lbl_date
            text: !lambda |-
              auto now = id(esptime).now();
              static char buf[11];
              snprintf(buf, sizeof(buf), "%02d.%02d.%04d", now.day_of_month, now.month, now.year);
              return buf;
        - lvgl.label.update:
            id: lbl_time
            text: !lambda |-
              auto now = id(esptime).now();
              static char buf[6];
              snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
              return buf;
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_date
              text: !lambda |-
                auto now = id(esptime).now();
                static char buf[11];
                snprintf(buf, sizeof(buf), "%02d.%02d.%04d", now.day_of_month, now.month, now.year);
                return buf;
          - lvgl.label.update:
              id: lbl_time
              text: !lambda |-
                auto now = id(esptime).now();
                static char buf[6];
                snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
                return buf;
      # antiburn schedule
      - hours: 2,3,4,5
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 2,3,4,5
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn

switch:
  - platform: template
    name: "Display Antiburn"
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:

binary_sensor:
  - platform: gpio
    id: home_button
    entity_category: "diagnostic"
    pin:
      number: 20
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Sauna Push Button"
    on_double_click:
      min_length: 50ms
      max_length: 350ms
      then:
        - lvgl.page.next:
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_bl

text_sensor:
  - platform: version
    name: "Sauna ESPHome Version"
    id: sauna_esphome_version
    entity_category: "diagnostic"
    on_value:
      - lvgl.label.update:
          id: lbl_esphome_version
          text: !lambda |-
            static char buf[42];
            snprintf(buf, sizeof(buf), "%s", x.c_str());
            return buf;
  - platform: wifi_info
    ip_address:
      name: "Sauna IP Address"
      id: sauna_ip_address
      entity_category: "diagnostic"
      on_value:
        - lvgl.label.update:
            id: lbl_diagnostic_ipv4_value
            text: !lambda |-
              static char buf[42];
              snprintf(buf, sizeof(buf), "%s", x.c_str());
              return buf;
    ssid:
      name: "Sauna SSID"
      id: sauna_ssid
      entity_category: "diagnostic"
      on_value:
        - lvgl.label.update:
            id: lbl_diagnostic_ssid_value
            text: !lambda |-
              static char buf[42];
              snprintf(buf, sizeof(buf), "%s", x.c_str());
              return buf;
    bssid:
      name: "Sauna BSSID"
      id: sauna_bssid
      entity_category: "diagnostic"
    mac_address:
      name: "Sauna MAC Address"
      id: sauna_mac_address
      entity_category: "diagnostic"
      on_value:
        - lvgl.label.update:
            id: lbl_diagnostic_mac_value
            text: !lambda |-
              static char buf[42];
              snprintf(buf, sizeof(buf), "%s", x.c_str());
              return buf;
    dns_address:
      name: "Sauna DNS Address"
      id: sauna_dns_address
      entity_category: "diagnostic"
      on_value:
        - lvgl.label.update:
            id: lbl_diagnostic_dns_value
            text: !lambda |-
              static char buf[42];
              snprintf(buf, sizeof(buf), "%s", x.c_str());
              return buf;

sensor: !include sensors.yaml

font: !include fonts.yaml

display: !include display.yaml
lvgl: !include lvgl.yaml

number:
  - platform: template
    name: LVGL Screen Timeout
    entity_category: "config"
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 60
    restore_value: true
    min_value: 30
    max_value: 300
    step: 10
    mode: box
